spring.config.import=optional:file:.env[.properties]
spring.application.name=Ecomm

# ===============================
# MySQL Database Configuration
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ecomm}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:KILO}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===============================
# SQL Init
# ===============================
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ===============================
# Server
# ===============================
server.port=8080
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# ===============================
# JWT Configuration
# ===============================
jwt.secret=${JWT_SECRET:Q2hhbkdwYlJzS0xjV2ZtV1lZV2d4R2h3bU9rV2h0Z2ZQ}
jwt.expiration-ms=86400000

# ===============================
# RabbitMQ
# ===============================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# ===============================
# Brevo SMTP
# ===============================
spring.mail.host=${BREVO_SMTP_HOST:smtp-relay.brevo.com}
spring.mail.port=${BREVO_SMTP_PORT:587}
spring.mail.username=${BREVO_SMTP_USERNAME:}
spring.mail.password=${BREVO_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM:${spring.mail.username:}}

# ===============================
# App Security / Frontend
# ===============================
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}
app.password-reset.expiration-minutes=${APP_PASSWORD_RESET_EXPIRATION_MINUTES:30}
app.security.password-bcrypt-strength=${APP_PASSWORD_BCRYPT_STRENGTH:12}
app.security.cors-allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

# ===============================
# Actuator / Health
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=CDrive backend service
