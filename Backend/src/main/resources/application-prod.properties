# ===============================
# Production overrides
# (these override application.properties when SPRING_PROFILES_ACTIVE=prod)
# ===============================

# No SQL logging in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Validate schema only — never auto-modify in production
spring.jpa.hibernate.ddl-auto=validate

# Never run data.sql in production
spring.sql.init.mode=never

# Hide all error details from API responses
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# Hide health check internals
management.endpoint.health.show-details=never