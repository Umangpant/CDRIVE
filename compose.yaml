services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ecomm}
      MYSQL_USER: ${MYSQL_USER:-ecomm}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ecomm123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  rabbitmq:
    image: rabbitmq:3.13-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-ecomm}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-ecomm123}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5673}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  app:
    profiles:
      - fullstack
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-ecomm}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-ecomm}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-ecomm123}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-ecomm}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-ecomm123}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-.env}
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL:-http://localhost:5173}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      APP_PASSWORD_RESET_EXPIRATION_MINUTES: ${APP_PASSWORD_RESET_EXPIRATION_MINUTES:-30}
      APP_PASSWORD_BCRYPT_STRENGTH: ${APP_PASSWORD_BCRYPT_STRENGTH:-12}
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-false}
      BREVO_SMTP_HOST: ${BREVO_SMTP_HOST:-smtp-relay.brevo.com}
      BREVO_SMTP_PORT: ${BREVO_SMTP_PORT:-587}
      BREVO_SMTP_USERNAME: ${BREVO_SMTP_USERNAME:-}
      BREVO_SMTP_PASSWORD: ${BREVO_SMTP_PASSWORD:-}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-}
    ports:
      - "${APP_HOST_PORT:-8080}:8080"

volumes:
  mysql-data:
  rabbitmq-data:
